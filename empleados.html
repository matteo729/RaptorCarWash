<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR CARWASH - Empleado</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>🦅 RAPTOR CARWASH</h2>
                <p>Panel Empleado</p>
                <p id="userInfo"></p>
            </div>
            <nav>
                <button class="nav-btn active" onclick="mostrarSeccionEmpleado('registro')">📝 Registrar Lavado</button>
                <button class="nav-btn" onclick="mostrarSeccionEmpleado('historial')">📜 Mi Historial</button>
            </nav>
            <button class="logout-btn" onclick="cerrarSesion()">🚪 Cerrar Sesión</button>
        </aside>
        
        <main class="main-content">
            <div id="empleado-seccion-registro" class="seccion active">
                <h1>Registrar Lavado</h1>
                <div class="card">
                    <input type="text" id="modeloAuto" placeholder="Modelo del auto">
                    <input type="text" id="matriculaAuto" placeholder="Matrícula">
                    <select id="servicioSelect">
                        <option value="">Cargando servicios...</option>
                    </select>
                    <input type="number" id="precioFinal" placeholder="Precio" readonly>
                    <textarea id="observaciones" placeholder="Observaciones"></textarea>
                    <button onclick="registrarLavado()">Registrar Lavado</button>
                </div>
            </div>
            
            <div id="empleado-seccion-historial" class="seccion">
                <h1>Mi Historial</h1>
                <div class="stats-grid" id="statsEmpleado"></div>
                <div class="card">
                    <table class="data-table">
                        <thead><tr><th>Fecha</th><th>Modelo</th><th>Matrícula</th><th>Servicio</th><th>Precio</th><th>Comisión</th></tr></thead>
                        <tbody id="miHistorial"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
