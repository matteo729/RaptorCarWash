<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR CARWASH - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-box h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        
        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }
        
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #e94560;
            border-bottom: 2px solid #e94560;
            margin-bottom: -2px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        button {
            width: 100%;
            background: #e94560;
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 1rem;
        }
        
        button:hover {
            background: #d63a55;
        }
        
        .message {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #666;
        }
        
        .loading {
            text-align: center;
            color: #e94560;
            margin-top: 1rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>RAPTOR CARWASH</h1>
            <p class="login-subtitle">Sistema de Gestión</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
            </div>
            
            <div id="messageContainer"></div>
            
            <!-- Login Tab -->
            <div id="loginTab" class="tab-content active">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    </div>
                    <button type="submit">Iniciar Sesión</button>
                </form>
            </div>
            
            <!-- Register Tab -->
            <div id="registerTab" class="tab-content">
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <input type="text" id="regNombre" placeholder="Nombre completo" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="regEmail" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="regPassword" placeholder="Contraseña" required>
                    </div>
                    <button type="submit">Registrarse</button>
                </form>
                <p class="info-text">⚠️ El primer usuario registrado será el Administrador</p>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== CONFIGURACIÓN DE SUPABASE CON TUS DATOS ====================
        const SUPABASE_URL = 'https://ldalildhdukyjnvmjlsg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkYWxpbGRoZHVreWpudm1qbHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzcxMTYsImV4cCI6MjA5MTg1MzExNn0.f-sLoQgbtBfqmoPweJ0am7pnCIGiaZhkGaAjc_s8Y8A';
        
        console.log('Conectando a Supabase...');
        console.log('URL:', SUPABASE_URL);
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Probar conexión a Supabase
        async function testConnection() {
            try {
                const { data, error } = await supabase.from('servicios').select('count', { count: 'exact', head: true });
                if (error) {
                    console.error('Error en tabla servicios:', error);
                    // Si la tabla no existe, mostramos mensaje pero no como error fatal
                    if (error.code === '42P01') {
                        console.warn('La tabla servicios no existe aún. Debes ejecutar el SQL de creación.');
                        return true; // La conexión funciona, solo falta crear tablas
                    }
                    throw error;
                }
                console.log('✅ Conexión a Supabase exitosa');
                return true;
            } catch (error) {
                console.error('❌ Error de conexión a Supabase:', error);
                document.getElementById('messageContainer').innerHTML = `
                    <div class="message error-message">
                        Error de conexión: ${error.message}. Verifica tu conexión a internet.
                    </div>
                `;
                return false;
            }
        }
        
        // Cambiar entre tabs
        window.switchTab = function(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const tabs = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        };
        
        // Mostrar mensajes
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}-message">${message}</div>`;
            setTimeout(() => {
                if (container.innerHTML === `<div class="message ${type}-message">${message}</div>`) {
                    container.innerHTML = '';
                }
            }, 5000);
        }
        
        // Handle Register
        window.handleRegister = async function(event) {
            event.preventDefault();
            
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            console.log('Intentando registrar:', email);
            
            try {
                // Crear usuario en Supabase Auth
                const { data: authData, error: signUpError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: nombre
                        }
                    }
                });
                
                if (signUpError) {
                    console.error('Error de registro:', signUpError);
                    if (signUpError.message.includes('User already registered')) {
                        throw new Error('Este email ya está registrado');
                    }
                    throw signUpError;
                }
                
                if (!authData.user) {
                    throw new Error('No se pudo crear el usuario');
                }
                
                console.log('Usuario creado exitosamente:', authData.user.id);
                
                // Verificar si es el primer usuario (admin)
                const { count, error: countError } = await supabase
                    .from('empleados')
                    .select('*', { count: 'exact', head: true });
                
                // Si hay error y es porque la tabla no existe, crear la tabla primero
                if (countError && countError.code === '42P01') {
                    console.warn('La tabla empleados no existe. Debes ejecutar el SQL de creación en Supabase.');
                    showMessage('⚠️ Error: Las tablas no están creadas. Por favor, ejecuta el SQL de creación en Supabase.', 'error');
                    return;
                }
                
                // Si es el primer usuario, NO lo agregamos a empleados (será admin)
                if (count === 0) {
                    console.log('✅ Primer usuario registrado - será Administrador');
                    showMessage('¡Administrador registrado exitosamente! Ahora puedes iniciar sesión.', 'success');
                } else {
                    // Si no es el primer usuario, lo agregamos como empleado
                    const { error: empError } = await supabase
                        .from('empleados')
                        .insert([{
                            user_id: authData.user.id,
                            nombre: nombre,
                            email: email,
                            activo: true
                        }]);
                    
                    if (empError) {
                        console.error('Error al crear empleado:', empError);
                        showMessage('Usuario creado pero hubo un error al asignar rol. Contacta al administrador.', 'error');
                    } else {
                        showMessage('¡Empleado registrado exitosamente!', 'success');
                    }
                }
                
                // Limpiar formulario
                document.getElementById('registerForm').reset();
                
                // Cambiar a login después de 2 segundos
                setTimeout(() => {
                    switchTab('login');
                    showMessage('Ahora puedes iniciar sesión con tus credenciales', 'success');
                }, 2000);
                
            } catch (error) {
                console.error('Error detallado:', error);
                showMessage('Error: ' + error.message, 'error');
            }
        };
        
        // Handle Login
        window.handleLogin = async function(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            console.log('Intentando login:', email);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error('Error de login:', error);
                    if (error.message.includes('Invalid login credentials')) {
                        throw new Error('Email o contraseña incorrectos');
                    }
                    throw error;
                }
                
                if (!data.user) {
                    throw new Error('No se pudo autenticar el usuario');
                }
                
                console.log('Login exitoso:', data.user.email);
                
                // Verificar si es admin o empleado
                const { data: empleado, error: empError } = await supabase
                    .from('empleados')
                    .select('*')
                    .eq('user_id', data.user.id)
                    .single();
                
                if (empError) {
                    // Si hay error, asumimos que es admin (no está en tabla empleados)
                    console.log('Usuario es ADMINISTRADOR');
                    showMessage('Bienvenido Administrador', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else if (empleado) {
                    // Es empleado
                    console.log('Usuario es EMPLEADO:', empleado.nombre);
                    showMessage('Bienvenido ' + empleado.nombre, 'success');
                    setTimeout(() => {
                        window.location.href = 'empleados.html';
                    }, 1000);
                } else {
                    // Por defecto, admin
                    console.log('Usuario es ADMINISTRADOR (por defecto)');
                    showMessage('Bienvenido Administrador', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                }
                
            } catch (error) {
                console.error('Error en login:', error);
                showMessage('Error: ' + error.message, 'error');
            }
        };
        
        // Probar conexión al cargar la página
        testConnection();
    </script>
</body>
</html>
