<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR CARWASH - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-box h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        
        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }
        
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #e94560;
            border-bottom: 2px solid #e94560;
            margin-bottom: -2px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .login-box form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .login-box input {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .login-box button {
            background: #e94560;
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        .login-box button:hover {
            background: #d63a55;
        }
        
        .message {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>RAPTOR CARWASH</h1>
            <p class="login-subtitle">Sistema de Gestión</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
            </div>
            
            <div id="messageContainer"></div>
            
            <!-- Login Tab -->
            <div id="loginTab" class="tab-content active">
                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    <button type="submit">Iniciar Sesión</button>
                </form>
            </div>
            
            <!-- Register Tab -->
            <div id="registerTab" class="tab-content">
                <form id="registerForm">
                    <input type="text" id="regNombre" placeholder="Nombre completo" required>
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <input type="password" id="regPassword" placeholder="Contraseña" required>
                    <button type="submit">Registrarse como Administrador</button>
                </form>
                <p class="info-text">⚠️ El primer usuario registrado será el Administrador Principal</p>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== CONFIGURACIÓN DE SUPABASE ====================
        // ¡IMPORTANTE! Reemplaza con tus datos reales de Supabase
        const SUPABASE_URL = 'https://ldalildhdukyjnvmjlsg.supabase.co';  // <--- CAMBIA ESTO
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkYWxpbGRoZHVreWpudm1qbHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzcxMTYsImV4cCI6MjA5MTg1MzExNn0.f-sLoQgbtBfqmoPweJ0am7pnCIGiaZhkGaAjc_s8Y8A';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Cambiar entre tabs
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const tabs = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }
        
        // Mostrar mensajes
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}-message">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        // Registro de administrador
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                // 1. Verificar si ya hay usuarios en el sistema
                const { data: existingUsers, error: countError } = await supabase
                    .from('empleados')
                    .select('*', { count: 'exact', head: true });
                
                // 2. Crear usuario en auth
                const { data: authData, error: signUpError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (signUpError) throw signUpError;
                
                if (!authData.user) {
                    throw new Error('No se pudo crear el usuario');
                }
                
                // 3. El primer usuario NO se agrega a la tabla empleados (será admin)
                // Los siguientes usuarios SÍ se agregarán como empleados
                
                showMessage('¡Registro exitoso! Ahora puedes iniciar sesión como Administrador.', 'success');
                
                // Limpiar formulario
                document.getElementById('registerForm').reset();
                
                // Cambiar a pestaña de login después de 2 segundos
                setTimeout(() => {
                    switchTab('login');
                }, 2000);
                
            } catch (error) {
                console.error('Error en registro:', error);
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Verificar si es admin o empleado
                    const { data: empleado, error: empError } = await supabase
                        .from('empleados')
                        .select('*')
                        .eq('user_id', data.user.id)
                        .single();
                    
                    if (empError || !empleado) {
                        // Es admin
                        showMessage('Bienvenido Administrador', 'success');
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 1000);
                    } else {
                        // Es empleado
                        showMessage('Bienvenido ' + empleado.nombre, 'success');
                        setTimeout(() => {
                            window.location.href = 'empleados.html';
                        }, 1000);
                    }
                }
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
