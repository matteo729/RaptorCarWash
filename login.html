<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR CARWASH - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
        }
        
        .btn-primary:hover {
            background: #d63a55;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .divider {
            text-align: center;
            margin: 15px 0;
            color: #999;
            font-size: 12px;
        }
        
        .section-title {
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🦅 RAPTOR CARWASH</h1>
            <div class="subtitle">Sistema de Gestión</div>
            
            <div id="messageBox"></div>
            
            <!-- Login Section -->
            <div id="loginSection">
                <div class="section-title">INICIAR SESIÓN</div>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button id="loginBtn" class="btn-primary">INGRESAR</button>
                <div class="divider">────────── o ──────────</div>
                <button id="showRegisterBtn" class="btn-secondary">CREAR CUENTA</button>
            </div>
            
            <!-- Register Section -->
            <div id="registerSection" style="display: none;">
                <div class="section-title">CREAR CUENTA</div>
                <input type="text" id="regNombre" placeholder="Nombre completo">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Contraseña (mínimo 6 caracteres)">
                <button id="registerBtn" class="btn-primary">REGISTRARSE</button>
                <div class="divider">────────── o ──────────</div>
                <button id="showLoginBtn" class="btn-secondary">VOLVER AL LOGIN</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://ldalildhdukyjnvmjlsg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkYWxpbGRoZHVreWpudm1qbHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzcxMTYsImV4cCI6MjA5MTg1MzExNn0.f-sLoQgbtBfqmoPweJ0am7pnCIGiaZhkGaAjc_s8Y8A';
        
        // Inicializar Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        console.log("✅ App iniciada");
        
        // Función para mostrar mensajes
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (box.innerHTML === `<div class="message ${type}">${text}</div>`) {
                    box.innerHTML = '';
                }
            }, 5000);
        }
        
        // Cambiar entre secciones
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('messageBox').innerHTML = '';
        };
        
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('messageBox').innerHTML = '';
        };
        
        // FUNCIÓN DE REGISTRO
        document.getElementById('registerBtn').onclick = async () => {
            console.log("Registro: Iniciando...");
            
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if (!nombre || !email || !password) {
                showMessage("Completa todos los campos", "error");
                return;
            }
            
            if (password.length < 6) {
                showMessage("La contraseña debe tener al menos 6 caracteres", "error");
                return;
            }
            
            showMessage("Creando usuario...", "info");
            
            try {
                // Crear usuario
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { full_name: nombre }
                    }
                });
                
                if (error) {
                    console.error("Error registro:", error);
                    showMessage("Error: " + error.message, "error");
                    return;
                }
                
                console.log("Usuario creado:", data);
                showMessage("¡Usuario creado exitosamente! Ahora puedes iniciar sesión.", "success");
                
                // Limpiar y volver al login
                document.getElementById('regNombre').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                
                setTimeout(() => {
                    document.getElementById('showLoginBtn').click();
                }, 2000);
                
            } catch (err) {
                console.error("Error:", err);
                showMessage("Error: " + err.message, "error");
            }
        };
        
        // FUNCIÓN DE LOGIN
        document.getElementById('loginBtn').onclick = async () => {
            console.log("Login: Iniciando...");
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage("Completa todos los campos", "error");
                return;
            }
            
            showMessage("Iniciando sesión...", "info");
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error("Error login:", error);
                    showMessage("Error: " + error.message, "error");
                    return;
                }
                
                console.log("Login exitoso:", data);
                showMessage("¡Bienvenido! Redirigiendo...", "success");
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1500);
                
            } catch (err) {
                console.error("Error:", err);
                showMessage("Error: " + err.message, "error");
            }
        };
        
        // Enter key support
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        
        document.getElementById('regPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });
    </script>
</body>
</html>
