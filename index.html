<!DOCTYPE html>
<html>
<head>
    <title>RAPTOR CARWASH - Login</title>
    <style>
        body {
            font-family: Arial;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .panel {
            display: none;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            display: flex;
        }
        .sidebar {
            width: 200px;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            height: 100vh;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        .btn-menu {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            text-align: left;
        }
        .btn-menu:hover {
            background: #e94560;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        .logout {
            margin-top: 50px;
            background: #dc3545;
        }
    </style>
</head>
<body>

<!-- Pantalla de Login -->
<div id="loginScreen">
    <div class="login-box">
        <h2>RAPTOR CARWASH</h2>
        <div id="msgLogin"></div>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="hacerLogin()">INGRESAR</button>
        <p style="margin-top: 15px; font-size: 12px;">admin / admin123</p>
    </div>
</div>

<!-- Panel Admin -->
<div id="adminPanel" class="panel">
    <div class="header">
        <h2>RAPTOR CARWASH - Panel Administrador</h2>
        <button onclick="cerrarSesion()" style="float: right; margin-top: -40px;">Cerrar Sesión</button>
    </div>
    <div class="container">
        <div class="sidebar">
            <button class="btn-menu" onclick="mostrarSeccion('dashboard')">📊 Dashboard</button>
            <button class="btn-menu" onclick="mostrarSeccion('precios')">💰 Precios</button>
            <button class="btn-menu" onclick="mostrarSeccion('empleados')">👥 Empleados</button>
            <button class="btn-menu" onclick="mostrarSeccion('historial')">📜 Historial</button>
        </div>
        <div class="content">
            <div id="seccion-dashboard">
                <div class="card">
                    <h3>Dashboard</h3>
                    <p>Bienvenido Administrador</p>
                    <div id="stats"></div>
                </div>
            </div>
            <div id="seccion-precios" style="display:none">
                <div class="card">
                    <h3>Agregar Servicio</h3>
                    <input type="text" id="nombreServicio" placeholder="Nombre">
                    <input type="number" id="precioServicio" placeholder="Precio">
                    <input type="number" id="comisionServicio" placeholder="Comisión">
                    <button onclick="agregarServicio()">Agregar</button>
                </div>
                <div class="card">
                    <h3>Servicios</h3>
                    <div id="listaServicios"></div>
                </div>
            </div>
            <div id="seccion-empleados" style="display:none">
                <div class="card">
                    <h3>Agregar Empleado</h3>
                    <input type="text" id="userEmpleado" placeholder="Usuario">
                    <input type="text" id="nombreEmpleado" placeholder="Nombre">
                    <input type="password" id="passEmpleado" placeholder="Contraseña">
                    <button onclick="agregarEmpleado()">Agregar</button>
                </div>
                <div class="card">
                    <h3>Empleados</h3>
                    <div id="listaEmpleados"></div>
                </div>
            </div>
            <div id="seccion-historial" style="display:none">
                <div class="card">
                    <h3>Historial de Lavados</h3>
                    <div id="listaHistorial"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Panel Empleado -->
<div id="empleadoPanel" class="panel">
    <div class="header">
        <h2>RAPTOR CARWASH - Panel Empleado</h2>
        <button onclick="cerrarSesion()" style="float: right; margin-top: -40px;">Cerrar Sesión</button>
    </div>
    <div class="container">
        <div class="sidebar">
            <button class="btn-menu" onclick="mostrarSeccionEmpleado('registro')">📝 Registrar Lavado</button>
            <button class="btn-menu" onclick="mostrarSeccionEmpleado('historial')">📜 Mi Historial</button>
        </div>
        <div class="content">
            <div id="empleado-seccion-registro">
                <div class="card">
                    <h3>Registrar Lavado</h3>
                    <input type="text" id="modeloAuto" placeholder="Modelo">
                    <input type="text" id="matriculaAuto" placeholder="Matrícula">
                    <select id="servicioSelect"></select>
                    <input type="number" id="precioFinal" placeholder="Precio" readonly>
                    <textarea id="observaciones" placeholder="Observaciones"></textarea>
                    <button onclick="registrarLavado()">Guardar</button>
                </div>
            </div>
            <div id="empleado-seccion-historial" style="display:none">
                <div class="card">
                    <h3>Mi Historial</h3>
                    <div id="miHistorial"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // USUARIOS PREDEFINIDOS
    let usuarios = {
        'admin': { password: 'admin123', nombre: 'Administrador', rol: 'admin' },
        'juan': { password: 'juan123', nombre: 'Juan Perez', rol: 'empleado' }
    };
    
    let usuarioActual = null;
    
    // Cargar empleados guardados
    function cargarEmpleadosGuardados() {
        let guardados = localStorage.getItem('empleadosExtra');
        if (guardados) {
            let extra = JSON.parse(guardados);
            extra.forEach(e => {
                usuarios[e.user] = { password: e.pass, nombre: e.nombre, rol: 'empleado' };
            });
        }
    }
    
    // Guardar empleados
    function guardarEmpleados() {
        let extra = [];
        for (let u in usuarios) {
            if (u !== 'admin' && u !== 'juan') {
                extra.push({ user: u, nombre: usuarios[u].nombre, pass: usuarios[u].password });
            }
        }
        localStorage.setItem('empleadosExtra', JSON.stringify(extra));
    }
    
    // Servicios
    let servicios = [
        { id: 1, nombre: 'Lavado Básico Auto', precio: 5000, comision: 1500 },
        { id: 2, nombre: 'Lavado Completo Auto', precio: 8000, comision: 2400 },
        { id: 3, nombre: 'Lavado Básico Moto', precio: 3000, comision: 900 }
    ];
    
    function guardarServicios() {
        localStorage.setItem('servicios', JSON.stringify(servicios));
    }
    
    function cargarServiciosGuardados() {
        let guardados = localStorage.getItem('servicios');
        if (guardados) {
            servicios = JSON.parse(guardados);
        }
    }
    
    // Lavados
    let lavados = [];
    
    function guardarLavados() {
        localStorage.setItem('lavados', JSON.stringify(lavados));
    }
    
    function cargarLavadosGuardados() {
        let guardados = localStorage.getItem('lavados');
        if (guardados) {
            lavados = JSON.parse(guardados);
        }
    }
    
    // Gastos
    let gastos = [];
    
    function guardarGastos() {
        localStorage.setItem('gastos', JSON.stringify(gastos));
    }
    
    function cargarGastosGuardados() {
        let guardados = localStorage.getItem('gastos');
        if (guardados) {
            gastos = JSON.parse(guardados);
        }
    }
    
    // LOGIN
    window.hacerLogin = function() {
        let user = document.getElementById('username').value;
        let pass = document.getElementById('password').value;
        let msg = document.getElementById('msgLogin');
        
        cargarEmpleadosGuardados();
        
        if (!usuarios[user]) {
            msg.innerHTML = '<div class="error">Usuario no existe</div>';
            return;
        }
        
        if (usuarios[user].password !== pass) {
            msg.innerHTML = '<div class="error">Contraseña incorrecta</div>';
            return;
        }
        
        usuarioActual = { user: user, nombre: usuarios[user].nombre, rol: usuarios[user].rol };
        
        document.getElementById('loginScreen').style.display = 'none';
        
        if (usuarioActual.rol === 'admin') {
            document.getElementById('adminPanel').style.display = 'block';
            actualizarDashboard();
            mostrarListaServicios();
            mostrarListaEmpleados();
            mostrarHistorialAdmin();
        } else {
            document.getElementById('empleadoPanel').style.display = 'block';
            cargarSelectServicios();
            mostrarMiHistorial();
        }
    };
    
    window.cerrarSesion = function() {
        usuarioActual = null;
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('empleadoPanel').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('msgLogin').innerHTML = '';
    };
    
    // ADMIN - Mostrar secciones
    window.mostrarSeccion = function(seccion) {
        document.getElementById('seccion-dashboard').style.display = 'none';
        document.getElementById('seccion-precios').style.display = 'none';
        document.getElementById('seccion-empleados').style.display = 'none';
        document.getElementById('seccion-historial').style.display = 'none';
        
        document.getElementById(`seccion-${seccion}`).style.display = 'block';
        
        if (seccion === 'dashboard') actualizarDashboard();
        if (seccion === 'precios') mostrarListaServicios();
        if (seccion === 'empleados') mostrarListaEmpleados();
        if (seccion === 'historial') mostrarHistorialAdmin();
    };
    
    function actualizarDashboard() {
        let totalVentas = lavados.reduce((sum, l) => sum + l.precio, 0);
        let totalGastos = gastos.reduce((sum, g) => sum + g.monto, 0);
        let ganancia = totalVentas - totalGastos;
        
        document.getElementById('stats').innerHTML = `
            <p>💰 Ganancias: $${totalVentas}</p>
            <p>💸 Gastos: $${totalGastos}</p>
            <p>📈 Ganancia Neta: $${ganancia}</p>
            <p>🚗 Lavados: ${lavados.length}</p>
            <hr>
            <h4>Registrar Gasto</h4>
            <input type="text" id="gastoConcepto" placeholder="Concepto">
            <input type="number" id="gastoMonto" placeholder="Monto">
            <button onclick="registrarGasto()">Registrar</button>
        `;
    }
    
    window.registrarGasto = function() {
        let concepto = document.getElementById('gastoConcepto').value;
        let monto = parseFloat(document.getElementById('gastoMonto').value);
        
        if (!concepto || !monto) {
            alert('Complete todos los campos');
            return;
        }
        
        gastos.push({ concepto, monto, fecha: new Date().toISOString() });
        guardarGastos();
        document.getElementById('gastoConcepto').value = '';
        document.getElementById('gastoMonto').value = '';
        actualizarDashboard();
        alert('Gasto registrado');
    };
    
    // ADMIN - Servicios
    window.agregarServicio = function() {
        let nombre = document.getElementById('nombreServicio').value;
        let precio = parseFloat(document.getElementById('precioServicio').value);
        let comision = parseFloat(document.getElementById('comisionServicio').value);
        
        if (!nombre || !precio) {
            alert('Complete los datos');
            return;
        }
        
        let nuevo = {
            id: Date.now(),
            nombre: nombre,
            precio: precio,
            comision: comision || precio * 0.3
        };
        
        servicios.push(nuevo);
        guardarServicios();
        
        document.getElementById('nombreServicio').value = '';
        document.getElementById('precioServicio').value = '';
        document.getElementById('comisionServicio').value = '';
        
        mostrarListaServicios();
        alert('Servicio agregado');
    };
    
    function mostrarListaServicios() {
        let html = '<table><tr><th>Nombre</th><th>Precio</th><th>Comisión</th><th></th></tr>';
        servicios.forEach(s => {
            html += `<tr>
                        <td>${s.nombre}</td>
                        <td>$${s.precio}</td>
                        <td>$${s.comision}</td>
                        <td><button onclick="eliminarServicio(${s.id})">Eliminar</button></td>
                     </tr>`;
        });
        html += '</table>';
        document.getElementById('listaServicios').innerHTML = html;
    }
    
    window.eliminarServicio = function(id) {
        servicios = servicios.filter(s => s.id !== id);
        guardarServicios();
        mostrarListaServicios();
    };
    
    // ADMIN - Empleados
    window.agregarEmpleado = function() {
        let user = document.getElementById('userEmpleado').value;
        let nombre = document.getElementById('nombreEmpleado').value;
        let pass = document.getElementById('passEmpleado').value;
        
        if (!user || !nombre || !pass) {
            alert('Complete todos los campos');
            return;
        }
        
        if (usuarios[user]) {
            alert('El usuario ya existe');
            return;
        }
        
        usuarios[user] = { password: pass, nombre: nombre, rol: 'empleado' };
        guardarEmpleados();
        
        document.getElementById('userEmpleado').value = '';
        document.getElementById('nombreEmpleado').value = '';
        document.getElementById('passEmpleado').value = '';
        
        mostrarListaEmpleados();
        alert('Empleado agregado');
    };
    
    function mostrarListaEmpleados() {
        let html = '<table><tr><th>Usuario</th><th>Nombre</th><th></th></tr>';
        for (let u in usuarios) {
            if (usuarios[u].rol === 'empleado') {
                html += `<tr>
                            <td>${u}</td>
                            <td>${usuarios[u].nombre}</td>
                            <td><button onclick="eliminarEmpleado('${u}')">Eliminar</button></td>
                         </tr>`;
            }
        }
        html += '</table>';
        document.getElementById('listaEmpleados').innerHTML = html;
    }
    
    window.eliminarEmpleado = function(user) {
        if (confirm('¿Eliminar este empleado?')) {
            delete usuarios[user];
            guardarEmpleados();
            mostrarListaEmpleados();
        }
    };
    
    // ADMIN - Historial
    function mostrarHistorialAdmin() {
        let html = '<table><tr><th>Fecha</th><th>Empleado</th><th>Modelo</th><th>Matrícula</th><th>Servicio</th><th>Precio</th></tr>';
        lavados.forEach(l => {
            html += `<tr>
                        <td>${new Date(l.fecha).toLocaleDateString()}</td>
                        <td>${l.empleado}</td>
                        <td>${l.modelo}</td>
                        <td>${l.matricula}</td>
                        <td>${l.servicio}</td>
                        <td>$${l.precio}</td>
                     </tr>`;
        });
        html += '</table>';
        document.getElementById('listaHistorial').innerHTML = html;
    }
    
    // EMPLEADO - Funciones
    window.mostrarSeccionEmpleado = function(seccion) {
        document.getElementById('empleado-seccion-registro').style.display = 'none';
        document.getElementById('empleado-seccion-historial').style.display = 'none';
        
        document.getElementById(`empleado-seccion-${seccion}`).style.display = 'block';
        
        if (seccion === 'historial') mostrarMiHistorial();
    };
    
    function cargarSelectServicios() {
        let select = document.getElementById('servicioSelect');
        select.innerHTML = '<option value="">Seleccionar servicio</option>';
        servicios.forEach(s => {
            let option = document.createElement('option');
            option.value = JSON.stringify(s);
            option.textContent = `${s.nombre} - $${s.precio}`;
            select.appendChild(option);
        });
        
        select.onchange = function() {
            if (this.value) {
                let s = JSON.parse(this.value);
                document.getElementById('precioFinal').value = s.precio;
            }
        };
    }
    
    window.registrarLavado = function() {
        let servicioStr = document.getElementById('servicioSelect').value;
        if (!servicioStr) {
            alert('Seleccione un servicio');
            return;
        }
        
        let servicio = JSON.parse(servicioStr);
        
        let nuevoLavado = {
            empleado: usuarioActual.user,
            modelo: document.getElementById('modeloAuto').value,
            matricula: document.getElementById('matriculaAuto').value,
            servicio: servicio.nombre,
            precio: parseFloat(document.getElementById('precioFinal').value),
            comision: servicio.comision,
            observaciones: document.getElementById('observaciones').value,
            fecha: new Date().toISOString()
        };
        
        if (!nuevoLavado.modelo || !nuevoLavado.matricula) {
            alert('Complete modelo y matrícula');
            return;
        }
        
        lavados.push(nuevoLavado);
        guardarLavados();
        
        document.getElementById('modeloAuto').value = '';
        document.getElementById('matriculaAuto').value = '';
        document.getElementById('observaciones').value = '';
        document.getElementById('servicioSelect').value = '';
        document.getElementById('precioFinal').value = '';
        
        alert('✅ Lavado registrado');
        mostrarMiHistorial();
    };
    
    function mostrarMiHistorial() {
        let misLavados = lavados.filter(l => l.empleado === usuarioActual.user);
        let totalComisiones = misLavados.reduce((sum, l) => sum + l.comision, 0);
        
        let html = `<p>💰 Total comisiones: $${totalComisiones}</p>
                    <p>🚗 Lavados realizados: ${misLavados.length}</p>
                    <table><tr><th>Fecha</th><th>Modelo</th><th>Matrícula</th><th>Servicio</th><th>Precio</th><th>Comisión</th></tr>`;
        
        misLavados.forEach(l => {
            html += `<tr>
                        <td>${new Date(l.fecha).toLocaleDateString()}</td>
                        <td>${l.modelo}</td>
                        <td>${l.matricula}</td>
                        <td>${l.servicio}</td>
                        <td>$${l.precio}</td>
                        <td>$${l.comision}</td>
                     </tr>`;
        });
        html += '</table>';
        document.getElementById('miHistorial').innerHTML = html;
    }
    
    // Inicializar
    cargarServiciosGuardados();
    cargarLavadosGuardados();
    cargarGastosGuardados();
    
    console.log('✅ Sistema listo');
</script>
</body>
</html>
