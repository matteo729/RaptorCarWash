<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR CARWASH - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-box h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
        }
        
        .btn-primary:hover {
            background: #d63a55;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .divider {
            text-align: center;
            margin: 15px 0;
            color: #999;
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>RAPTOR CARWASH</h1>
            <p class="login-subtitle">Sistema de Gestión</p>
            
            <div id="messageBox"></div>
            
            <!-- SECCIÓN LOGIN (visible por defecto) -->
            <div id="loginSection">
                <div class="section-title">🔐 INICIAR SESIÓN</div>
                <input type="email" id="loginEmail" placeholder="Correo electrónico">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button id="doLoginBtn" class="btn-primary">INGRESAR</button>
                <div class="divider">────────── o ──────────</div>
                <button id="goToRegisterBtn" class="btn-secondary">CREAR CUENTA NUEVA</button>
            </div>
            
            <!-- SECCIÓN REGISTRO (oculta al inicio) -->
            <div id="registerSection" style="display: none;">
                <div class="section-title">📝 CREAR CUENTA</div>
                <input type="text" id="regNombre" placeholder="Nombre completo">
                <input type="email" id="regEmail" placeholder="Correo electrónico">
                <input type="password" id="regPassword" placeholder="Contraseña (mínimo 6 caracteres)">
                <button id="doRegisterBtn" class="btn-primary">REGISTRARME</button>
                <div class="divider">────────── o ──────────</div>
                <button id="goToLoginBtn" class="btn-secondary">VOLVER AL LOGIN</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://ldalildhdukyjnvmjlsg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkYWxpbGRoZHVreWpudm1qbHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzcxMTYsImV4cCI6MjA5MTg1MzExNn0.f-sLoQgbtBfqmoPweJ0am7pnCIGiaZhkGaAjc_s8Y8A';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (box.innerHTML === `<div class="message ${type}">${text}</div>`) {
                    box.innerHTML = '';
                }
            }, 5000);
        }
        
        // Cambiar a registro
        document.getElementById('goToRegisterBtn').onclick = function() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('messageBox').innerHTML = '';
        };
        
        // Cambiar a login
        document.getElementById('goToLoginBtn').onclick = function() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('messageBox').innerHTML = '';
        };
        
        // FUNCIÓN DE REGISTRO - Esta es la importante
        document.getElementById('doRegisterBtn').onclick = async function() {
            console.log("✅ Botón REGISTRAR presionado");
            
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            // Validaciones
            if (!nombre) {
                showMessage('❌ Por favor, ingresa tu nombre completo', 'error');
                return;
            }
            if (!email) {
                showMessage('❌ Por favor, ingresa tu correo electrónico', 'error');
                return;
            }
            if (!password) {
                showMessage('❌ Por favor, ingresa una contraseña', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('❌ La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            showMessage('⏳ Creando usuario...', 'info');
            
            try {
                // Crear usuario en Supabase
                const { data: authData, error: signUpError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { 
                            full_name: nombre 
                        }
                    }
                });
                
                if (signUpError) {
                    console.error("Error de registro:", signUpError);
                    showMessage('❌ Error: ' + signUpError.message, 'error');
                    return;
                }
                
                if (!authData.user) {
                    showMessage('❌ Error al crear el usuario', 'error');
                    return;
                }
                
                console.log("Usuario creado:", authData.user.id);
                
                // Verificar si es el primer usuario (admin)
                let esAdmin = false;
                try {
                    const { count, error: countError } = await supabase
                        .from('empleados')
                        .select('*', { count: 'exact', head: true });
                    
                    if (countError) {
                        console.log("Error al contar empleados, asumiendo que es admin:", countError);
                        esAdmin = true;
                    } else {
                        esAdmin = (count === 0);
                    }
                } catch (e) {
                    console.log("Error verificando empleados, asumiendo admin:", e);
                    esAdmin = true;
                }
                
                if (esAdmin) {
                    showMessage('✅ ¡Administrador creado exitosamente! Ya puedes iniciar sesión.', 'success');
                } else {
                    // Agregar como empleado
                    const { error: empError } = await supabase
                        .from('empleados')
                        .insert([{
                            user_id: authData.user.id,
                            nombre: nombre,
                            email: email,
                            activo: true
                        }]);
                    
                    if (empError) {
                        console.error("Error al crear empleado:", empError);
                        showMessage('⚠️ Usuario creado pero hay error de configuración', 'error');
                    } else {
                        showMessage('✅ ¡Empleado creado exitosamente!', 'success');
                    }
                }
                
                // Limpiar formulario
                document.getElementById('regNombre').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                
                // Volver al login después de 2 segundos
                setTimeout(() => {
                    document.getElementById('goToLoginBtn').click();
                    showMessage('🔐 Ahora puedes iniciar sesión con tus credenciales', 'success');
                }, 2000);
                
            } catch (error) {
                console.error("Error inesperado:", error);
                showMessage('❌ Error inesperado: ' + error.message, 'error');
            }
        };
        
        // FUNCIÓN DE LOGIN
        document.getElementById('doLoginBtn').onclick = async function() {
            console.log("✅ Botón LOGIN presionado");
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('❌ Por favor, completa todos los campos', 'error');
                return;
            }
            
            showMessage('⏳ Iniciando sesión...', 'info');
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    showMessage('❌ Error: ' + error.message, 'error');
                    return;
                }
                
                if (data.user) {
                    showMessage('✅ ¡Login exitoso! Redirigiendo...', 'success');
                    
                    // Verificar si es empleado o admin
                    const { data: empleado } = await supabase
                        .from('empleados')
                        .select('*')
                        .eq('user_id', data.user.id)
                        .single();
                    
                    setTimeout(() => {
                        if (empleado) {
                            window.location.href = 'empleados.html';
                        } else {
                            window.location.href = 'admin.html';
                        }
                    }, 1500);
                }
                
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        };
        
        // Permitir Enter en los campos
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('doLoginBtn').click();
        });
        
        document.getElementById('regPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('doRegisterBtn').click();
        });
        
        console.log("✅ Aplicación cargada correctamente");
        console.log("🔗 Conectando a Supabase:", SUPABASE_URL);
    </script>
</body>
</html>
