<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR CARWASH - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-box h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        button {
            width: 100%;
            background: #e94560;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: #d63a55;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>RAPTOR CARWASH</h1>
            <p class="login-subtitle">Sistema de Gestión</p>
            
            <div id="messageBox"></div>
            
            <!-- Formulario de Login -->
            <div id="loginSection">
                <h3 style="margin-bottom: 15px;">Iniciar Sesión</h3>
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
                <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password">
                <button id="loginBtn">Iniciar Sesión</button>
                <div class="divider">o</div>
                <button id="showRegisterBtn" class="btn-secondary">Registrarse</button>
            </div>
            
            <!-- Formulario de Registro (oculto inicialmente) -->
            <div id="registerSection" style="display: none;">
                <h3 style="margin-bottom: 15px;">Registrarse</h3>
                <input type="text" id="regNombre" placeholder="Nombre completo">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Contraseña (mínimo 6 caracteres)">
                <button id="registerBtn">Registrarse</button>
                <div class="divider">o</div>
                <button id="showLoginBtn" class="btn-secondary">Volver al Login</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase con tus datos
        const SUPABASE_URL = 'https://ldalildhdukyjnvmjlsg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkYWxpbGRoZHVreWpudm1qbHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzcxMTYsImV4cCI6MjA5MTg1MzExNn0.f-sLoQgbtBfqmoPweJ0am7pnCIGiaZhkGaAjc_s8Y8A';
        
        // Inicializar Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Mostrar mensaje
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (box.innerHTML === `<div class="message ${type}">${text}</div>`) {
                    box.innerHTML = '';
                }
            }, 5000);
        }
        
        // Cambiar entre login y registro
        document.getElementById('showRegisterBtn').onclick = function() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('messageBox').innerHTML = '';
        };
        
        document.getElementById('showLoginBtn').onclick = function() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('messageBox').innerHTML = '';
        };
        
        // Función de Login
        document.getElementById('loginBtn').onclick = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Por favor, completa todos los campos', 'error');
                return;
            }
            
            showMessage('Iniciando sesión...', 'info');
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    showMessage('Error: ' + error.message, 'error');
                    return;
                }
                
                if (data.user) {
                    showMessage('¡Login exitoso! Redirigiendo...', 'success');
                    
                    // Verificar si es admin o empleado
                    const { data: empleado } = await supabase
                        .from('empleados')
                        .select('*')
                        .eq('user_id', data.user.id)
                        .single();
                    
                    setTimeout(() => {
                        if (empleado) {
                            window.location.href = 'empleados.html';
                        } else {
                            window.location.href = 'admin.html';
                        }
                    }, 1500);
                }
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        };
        
        // Función de Registro
        document.getElementById('registerBtn').onclick = async function() {
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if (!nombre || !email || !password) {
                showMessage('Por favor, completa todos los campos', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            showMessage('Registrando usuario...', 'info');
            
            try {
                // Crear usuario
                const { data: authData, error: signUpError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { full_name: nombre }
                    }
                });
                
                if (signUpError) {
                    showMessage('Error: ' + signUpError.message, 'error');
                    return;
                }
                
                if (!authData.user) {
                    showMessage('Error al crear usuario', 'error');
                    return;
                }
                
                // Verificar si es el primer usuario
                const { count } = await supabase
                    .from('empleados')
                    .select('*', { count: 'exact', head: true });
                
                // Si es el primer usuario, es admin (no se agrega a empleados)
                if (count === 0) {
                    showMessage('¡Administrador registrado exitosamente! Ahora puedes iniciar sesión.', 'success');
                } else {
                    // Agregar como empleado
                    const { error: empError } = await supabase
                        .from('empleados')
                        .insert([{
                            user_id: authData.user.id,
                            nombre: nombre,
                            email: email,
                            activo: true
                        }]);
                    
                    if (empError) {
                        showMessage('Usuario creado pero error al asignar rol', 'error');
                    } else {
                        showMessage('¡Empleado registrado exitosamente!', 'success');
                    }
                }
                
                // Limpiar formulario
                document.getElementById('regNombre').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                
                // Mostrar formulario de login
                setTimeout(() => {
                    document.getElementById('showLoginBtn').click();
                    showMessage('Ya puedes iniciar sesión con tus credenciales', 'success');
                }, 2000);
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        };
        
        // Permitir presionar Enter para login
        const loginPassword = document.getElementById('loginPassword');
        loginPassword.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
        
        // Permitir presionar Enter para registro
        const regPassword = document.getElementById('regPassword');
        regPassword.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerBtn').click();
            }
        });
        
        console.log('✅ Aplicación lista. Configuración de Supabase cargada.');
    </script>
</body>
</html>
