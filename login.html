<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR CARWASH - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
        }
        
        .btn-primary:hover {
            background: #d63a55;
        }
        
        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info-usuarios {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }
        
        .info-usuarios p {
            margin: 5px 0;
        }
        
        .info-usuarios strong {
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🦅 RAPTOR CARWASH</h1>
            <div class="subtitle">Sistema de Gestión</div>
            
            <div id="messageBox"></div>
            
            <input type="text" id="loginUser" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button id="loginBtn" class="btn-primary">INICIAR SESIÓN</button>
            
            <div class="info-usuarios">
                <p><strong>📋 Usuarios disponibles:</strong></p>
                <p>👑 <strong>admin</strong> / admin123 (Administrador)</p>
                <p>👤 <strong>juan</strong> / juan123 (Empleado)</p>
                <p>👤 <strong>maria</strong> / maria123 (Empleado)</p>
                <p style="margin-top: 8px; font-size: 11px;">💡 Para agregar nuevos empleados, edita el archivo login.html y agrega el usuario en la sección USUARIOS</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== USUARIOS PREDEFINIDOS ====================
        // Aquí puedes agregar más usuarios fácilmente
        const USUARIOS = {
            // Administrador
            'admin': {
                password: 'admin123',
                rol: 'admin',
                nombre: 'Administrador'
            },
            // Empleados
            'juan': {
                password: 'juan123',
                rol: 'empleado',
                nombre: 'Juan Pérez'
            },
            'maria': {
                password: 'maria123',
                rol: 'empleado',
                nombre: 'María García'
            }
            // ==========================================
            // 👇 AGREGAR NUEVOS EMPLEADOS AQUÍ:
            // 'pedro': {
            //     password: 'pedro123',
            //     rol: 'empleado',
            //     nombre: 'Pedro López'
            // }
            // ==========================================
        };
        
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (box.innerHTML === `<div class="message ${type}">${text}</div>`) {
                    box.innerHTML = '';
                }
            }, 3000);
        }
        
        // Login
        document.getElementById('loginBtn').onclick = function() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            
            if (!username || !password) {
                showMessage('❌ Ingresa usuario y contraseña', 'error');
                return;
            }
            
            const usuario = USUARIOS[username];
            
            if (!usuario) {
                showMessage('❌ Usuario no existe', 'error');
                return;
            }
            
            if (usuario.password !== password) {
                showMessage('❌ Contraseña incorrecta', 'error');
                return;
            }
            
            // Guardar datos del usuario en sessionStorage
            sessionStorage.setItem('usuario', JSON.stringify({
                username: username,
                nombre: usuario.nombre,
                rol: usuario.rol
            }));
            
            showMessage(`✅ Bienvenido ${usuario.nombre}`, 'success');
            
            // Redirigir según rol
            setTimeout(() => {
                if (usuario.rol === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'empleados.html';
                }
            }, 1000);
        };
        
        // Permitir Enter
        document.getElementById('loginPass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
        
        console.log("✅ Login listo. Usuarios cargados:", Object.keys(USUARIOS));
    </script>
</body>
</html>
